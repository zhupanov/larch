<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 1020" width="460" height="1020">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; font-size: 13px; fill: white; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #555; font-size: 11px; }
      line, polyline { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="230" y="20" fill="#333" font-size="16" font-weight="bold">/admin-add-user</text>

  <!-- Step 0: Parse & Validate Args -->
  <rect x="115" y="40" width="230" height="36" rx="20" fill="#5CB85C"/>
  <text x="230" y="58">Parse &amp; Validate Args</text>
  <line x1="230" y1="76" x2="230" y2="96"/>

  <!-- Step 1: Session Setup -->
  <rect x="140" y="96" width="180" height="36" rx="4" fill="#6C757D"/>
  <text x="230" y="114">Session Setup</text>
  <line x1="230" y1="132" x2="230" y2="152"/>

  <!-- Step 2: Check Duplicates -->
  <rect x="130" y="152" width="200" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="170">Check Duplicates</text>
  <line x1="230" y1="188" x2="230" y2="208"/>

  <!-- Step 3: Create Branch -->
  <rect x="140" y="208" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="226">Create Branch</text>
  <line x1="230" y1="244" x2="230" y2="264"/>

  <!-- Step 4: Edit JSON Files -->
  <rect x="140" y="264" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="282">Edit JSON Files</text>
  <line x1="230" y1="300" x2="230" y2="320"/>

  <!-- Step 5: Validate (pytest) -->
  <rect x="140" y="320" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="338">Validate (pytest)</text>
  <line x1="230" y1="356" x2="230" y2="376"/>

  <!-- Step 6: Commit -->
  <rect x="140" y="376" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="394">Commit</text>
  <line x1="230" y1="412" x2="230" y2="432"/>

  <!-- Decision: Has /bump-version? -->
  <polygon points="230,432 320,466 230,500 140,466" fill="#F0AD4E"/>
  <text x="230" y="463" font-size="12">Has /bump-</text>
  <text x="230" y="477" font-size="12">version?</text>

  <!-- Yes arrow -->
  <text x="215" y="515" class="label">yes</text>
  <line x1="230" y1="500" x2="230" y2="520"/>

  <!-- No arrow -->
  <text x="335" y="461" class="label">no</text>
  <polyline points="320,466 390,466 390,580 320,580" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 7: Version Bump -->
  <rect x="125" y="520" width="210" height="36" rx="4" fill="#7B68EE"/>
  <text x="230" y="538">Version Bump</text>
  <line x1="230" y1="556" x2="230" y2="580"/>

  <!-- Step 8: Create PR -->
  <rect x="140" y="580" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="598">Create PR</text>
  <line x1="230" y1="616" x2="230" y2="636"/>

  <!-- Step 9: Post to Slack -->
  <rect x="140" y="636" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="654">Post to Slack</text>
  <line x1="230" y1="672" x2="230" y2="692"/>

  <!-- Step 10: CI + Merge Loop -->
  <rect x="110" y="692" width="240" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="710">CI + Rebase + Merge Loop</text>
  <line x1="230" y1="728" x2="230" y2="748"/>

  <!-- CI Loop arrow -->
  <polyline points="110,710 70,710 70,692 110,692" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="45" y="701" class="label">retry</text>

  <!-- Decision: Merged? -->
  <polygon points="230,748 310,778 230,808 150,778" fill="#F0AD4E"/>
  <text x="230" y="778" font-size="12">Merged?</text>

  <!-- Bail -->
  <text x="325" y="773" class="label">bail</text>
  <polyline points="310,778 370,778 370,912 320,912" stroke="#D9534F" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Yes -->
  <text x="215" y="823" class="label">yes</text>
  <line x1="230" y1="808" x2="230" y2="838"/>

  <!-- Step 11: :merged: Emoji -->
  <rect x="120" y="838" width="220" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="856">Add :merged: Emoji</text>
  <line x1="230" y1="874" x2="230" y2="894"/>

  <!-- Step 12: Local Cleanup -->
  <rect x="140" y="894" width="180" height="36" rx="4" fill="#6C757D"/>
  <text x="230" y="912">Local Cleanup</text>
  <line x1="230" y1="930" x2="230" y2="950"/>

  <!-- Step 13: Verify Main & Cleanup -->
  <rect x="120" y="950" width="220" height="36" rx="4" fill="#6C757D"/>
  <text x="230" y="968">Verify Main &amp; Cleanup</text>
</svg>
