<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 780" width="480" height="780">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; font-size: 13px; fill: white; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #555; font-size: 11px; }
      line, polyline { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="240" y="20" fill="#333" font-size="16" font-weight="bold">/admin-upgrade-clients</text>

  <!-- Step 0: Session Setup -->
  <rect x="150" y="40" width="180" height="40" rx="4" fill="#6C757D"/>
  <text x="240" y="60">Session Setup</text>
  <line x1="240" y1="80" x2="240" y2="110"/>

  <!-- Phase 1: Upgrade + Prepare (parallel bash) -->
  <rect x="60" y="110" width="360" height="40" rx="4" fill="#17A2B8" stroke="#17A2B8" stroke-width="3"/>
  <text x="240" y="130">Phase 1: Upgrade + Prepare (bash)</text>
  <line x1="240" y1="150" x2="240" y2="170"/>

  <!-- Per-client Phase 1 box (dashed) -->
  <text x="240" y="168" fill="#555" font-size="11">Per Client (parallel)</text>
  <rect x="70" y="175" width="340" height="230" rx="8" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Preflight -->
  <rect x="120" y="190" width="240" height="32" rx="4" fill="#4A90D9"/>
  <text x="240" y="206" font-size="12">Remote Preflight Check</text>
  <line x1="240" y1="222" x2="240" y2="237"/>

  <!-- Decision: Up to date? -->
  <polygon points="240,237 320,262 240,287 160,262" fill="#F0AD4E"/>
  <text x="240" y="262" font-size="10">Up to date?</text>
  <text x="335" y="257" class="label" font-size="10">yes → skip</text>
  <text x="225" y="300" class="label" font-size="10">no</text>
  <line x1="240" y1="287" x2="240" y2="310"/>

  <!-- Clone + Upgrade + Re-bootstrap -->
  <rect x="95" y="310" width="290" height="32" rx="4" fill="#4A90D9"/>
  <text x="240" y="326" font-size="12">Clone → Upgrade → Re-bootstrap</text>
  <line x1="240" y1="342" x2="240" y2="360"/>

  <!-- Check bump-version -->
  <rect x="105" y="360" width="270" height="32" rx="4" fill="#4A90D9"/>
  <text x="240" y="376" font-size="12">Check /bump-version + Slack Ch.</text>

  <!-- End Phase 1 per-client -->
  <line x1="240" y1="410" x2="240" y2="430"/>

  <!-- Version Bump (LLM, sequential) -->
  <rect x="105" y="430" width="270" height="40" rx="4" fill="#7B68EE"/>
  <text x="240" y="450">Version Bump (LLM, sequential)</text>
  <line x1="240" y1="470" x2="240" y2="500"/>

  <!-- Phase 2: Publish + CI + Merge (parallel bash) -->
  <rect x="60" y="500" width="360" height="40" rx="4" fill="#17A2B8" stroke="#17A2B8" stroke-width="3"/>
  <text x="240" y="520">Phase 2: Publish + CI + Merge (bash)</text>
  <line x1="240" y1="540" x2="240" y2="558"/>

  <!-- Per-client Phase 2 box (dashed) -->
  <text x="240" y="556" fill="#555" font-size="11">Per Client (parallel)</text>
  <rect x="70" y="563" width="340" height="140" rx="8" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Create PR -->
  <rect x="155" y="578" width="170" height="32" rx="4" fill="#4A90D9"/>
  <text x="240" y="594" font-size="12">Create PR + Slack</text>
  <line x1="240" y1="610" x2="240" y2="625"/>

  <!-- CI + Merge Loop -->
  <rect x="110" y="625" width="260" height="32" rx="4" fill="#4A90D9"/>
  <text x="240" y="641" font-size="12">CI + Rebase + Merge Loop</text>
  <line x1="240" y1="657" x2="240" y2="668"/>

  <!-- :merged: + Cleanup -->
  <rect x="120" y="668" width="240" height="32" rx="4" fill="#6C757D"/>
  <text x="240" y="684" font-size="12">:merged: Emoji + Cleanup</text>

  <!-- End Phase 2 per-client -->
  <line x1="240" y1="708" x2="240" y2="730"/>

  <!-- Step 2: Final Report -->
  <rect x="150" y="730" width="180" height="40" rx="4" fill="#4A90D9"/>
  <text x="240" y="750">Final Report</text>
</svg>
