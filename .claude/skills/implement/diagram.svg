<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 1130" width="460" height="1130">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; font-size: 13px; fill: white; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #555; font-size: 11px; }
      line, polyline { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="230" y="20" fill="#333" font-size="16" font-weight="bold">/implement</text>

  <!-- Step 0: Session Setup -->
  <rect x="140" y="40" width="180" height="36" rx="4" fill="#6C757D"/>
  <text x="230" y="58">Session Setup</text>
  <line x1="230" y1="76" x2="230" y2="96"/>

  <!-- Decision: --quick? -->
  <polygon points="230,96 310,126 230,156 150,126" fill="#E8833A"/>
  <text x="230" y="126" font-size="11">--quick?</text>

  <!-- Quick path: Inline Design -->
  <text x="325" y="121" class="label">yes</text>
  <polyline points="310,126 370,126 370,175 335,175" fill="none" marker-end="url(#arrow)"/>
  <rect x="280" y="160" width="110" height="30" rx="4" fill="#E8833A"/>
  <text x="335" y="175" font-size="10" fill="white">Inline Design</text>
  <polyline points="335,190 370,190 370,210 260,210" fill="none" stroke="#E8833A" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Normal path: /design -->
  <text x="215" y="171" class="label">no</text>
  <line x1="230" y1="156" x2="230" y2="192"/>

  <!-- Step 1: Ensure Design Plan -->
  <rect x="125" y="192" width="210" height="36" rx="4" fill="#7B68EE"/>
  <text x="230" y="210">Ensure Design (/design)</text>
  <line x1="230" y1="228" x2="230" y2="248"/>

  <!-- Step 2: Implement Feature -->
  <rect x="140" y="248" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="266">Implement Feature</text>
  <line x1="230" y1="284" x2="230" y2="304"/>

  <!-- Step 3: Relevant Checks (1st) -->
  <rect x="120" y="304" width="220" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="322">Relevant Checks (1st)</text>
  <line x1="230" y1="340" x2="230" y2="360"/>

  <!-- Step 4: First Commit -->
  <rect x="140" y="360" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="378">Commit (implementation)</text>
  <line x1="230" y1="396" x2="230" y2="416"/>

  <!-- Decision: --quick for review? -->
  <polygon points="230,416 310,446 230,476 150,446" fill="#E8833A"/>
  <text x="230" y="446" font-size="11">--quick?</text>

  <!-- Quick review path -->
  <text x="325" y="441" class="label">yes</text>
  <polyline points="310,446 370,446 370,495 335,495" fill="none" marker-end="url(#arrow)"/>
  <rect x="270" y="480" width="130" height="30" rx="4" fill="#E8833A"/>
  <text x="335" y="495" font-size="10" fill="white">Quick Review (1 rd)</text>
  <polyline points="335,510 370,510 370,530 260,530" fill="none" stroke="#E8833A" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Normal review path -->
  <text x="215" y="491" class="label">no</text>
  <line x1="230" y1="476" x2="230" y2="512"/>

  <!-- Step 5: Code Review -->
  <rect x="125" y="512" width="210" height="36" rx="4" fill="#7B68EE"/>
  <text x="230" y="530">Code Review (/review)</text>
  <line x1="230" y1="548" x2="230" y2="568"/>

  <!-- Decision: Review changes? -->
  <polygon points="230,568 315,602 230,636 145,602" fill="#F0AD4E"/>
  <text x="230" y="599" font-size="12">Review</text>
  <text x="230" y="613" font-size="12">changes?</text>

  <!-- Yes arrow -->
  <text x="215" y="651" class="label">yes</text>
  <line x1="230" y1="636" x2="230" y2="661"/>

  <!-- Step 6: Relevant Checks (2nd) -->
  <rect x="120" y="661" width="220" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="679">Relevant Checks (2nd)</text>
  <line x1="230" y1="697" x2="230" y2="717"/>

  <!-- Step 7: Second Commit -->
  <rect x="125" y="717" width="210" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="735">Commit (review fixes)</text>
  <line x1="230" y1="753" x2="230" y2="773"/>

  <!-- Step 7a: Code Flow Diagram -->
  <rect x="110" y="773" width="240" height="36" rx="4" fill="#28A745"/>
  <text x="230" y="791">Code Flow Diagram</text>
  <line x1="230" y1="809" x2="230" y2="839"/>

  <!-- No arrow - skip to Code Flow Diagram (review changes=no) -->
  <text x="330" y="597" class="label">no</text>
  <polyline points="315,602 385,602 385,791 350,791" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Decision: Has /bump-version? -->
  <polygon points="230,839 320,873 230,907 140,873" fill="#F0AD4E"/>
  <text x="230" y="870" font-size="12">Has /bump-</text>
  <text x="230" y="884" font-size="12">version?</text>

  <!-- Yes arrow -->
  <text x="215" y="922" class="label">yes</text>
  <line x1="230" y1="907" x2="230" y2="932"/>

  <!-- No arrow - skip to PR -->
  <text x="335" y="868" class="label">no</text>
  <polyline points="320,873 395,873 395,992 335,992" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 8: Version Bump -->
  <rect x="125" y="932" width="210" height="36" rx="4" fill="#7B68EE"/>
  <text x="230" y="950">Version Bump</text>
  <line x1="230" y1="968" x2="230" y2="992"/>

  <!-- Step 9: Create PR -->
  <rect x="140" y="992" width="180" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="1010">Create PR</text>
  <line x1="230" y1="1028" x2="230" y2="1052"/>

  <!-- Step 10-13: CI + Slack + Cleanup -->
  <rect x="120" y="1052" width="220" height="36" rx="4" fill="#4A90D9"/>
  <text x="230" y="1070">CI + Slack + Cleanup</text>
</svg>
