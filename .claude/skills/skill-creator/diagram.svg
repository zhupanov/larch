<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" width="520" height="620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; font-size: 13px; fill: white; text-anchor: middle; dominant-baseline: central; }
      .label { fill: #555; font-size: 11px; }
      line, polyline { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="260" y="20" fill="#333" font-size="16" font-weight="bold">/skill-creator</text>

  <!-- Start -->
  <rect x="170" y="45" width="180" height="40" rx="20" fill="#5CB85C"/>
  <text x="260" y="65">Determine Phase</text>
  <line x1="260" y1="85" x2="260" y2="115"/>

  <!-- Phase Router Diamond -->
  <polygon points="260,115 390,175 260,235 130,175" fill="#F0AD4E"/>
  <text x="260" y="172" font-size="12">Which</text>
  <text x="260" y="186" font-size="12">phase?</text>

  <!-- Branch 1: Create (left) -->
  <text x="95" y="170" class="label">create</text>
  <line x1="130" y1="175" x2="80" y2="175" marker-end="none"/>
  <line x1="80" y1="175" x2="80" y2="290" marker-end="none"/>

  <rect x="15" y="290" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="80" y="308" font-size="12">Capture Intent</text>

  <rect x="15" y="340" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="80" y="358" font-size="12">Interview</text>

  <rect x="15" y="390" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="80" y="408" font-size="12">Write SKILL.md</text>

  <rect x="15" y="440" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="80" y="458" font-size="12">Test Cases</text>

  <line x1="80" y1="326" x2="80" y2="340"/>
  <line x1="80" y1="376" x2="80" y2="390"/>
  <line x1="80" y1="426" x2="80" y2="440"/>

  <!-- Branch 2: Evaluate (center-left) -->
  <text x="195" y="245" class="label">evaluate</text>
  <line x1="195" y1="235" x2="195" y2="290" marker-end="none"/>

  <rect x="155" y="290" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="220" y="308" font-size="12">Run Evals</text>

  <rect x="155" y="340" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="220" y="358" font-size="12">Grade Results</text>

  <rect x="155" y="390" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="220" y="408" font-size="12">View Feedback</text>

  <line x1="220" y1="326" x2="220" y2="340"/>
  <line x1="220" y1="376" x2="220" y2="390"/>

  <!-- Branch 3: Improve (center-right) -->
  <text x="325" y="245" class="label">improve</text>
  <line x1="325" y1="235" x2="325" y2="290" marker-end="none"/>

  <rect x="290" y="290" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="355" y="308" font-size="12">Edit SKILL.md</text>

  <rect x="290" y="340" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="355" y="358" font-size="12">Re-run Evals</text>

  <line x1="355" y1="326" x2="355" y2="340"/>

  <!-- Loop arrow for improve -->
  <polyline points="290,358 270,358 270,308 290,308" stroke="#333" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <text x="258" y="333" class="label" style="writing-mode: tb;">loop</text>

  <!-- Branch 4: Optimize (right) -->
  <text x="430" y="170" class="label">optimize</text>
  <line x1="390" y1="175" x2="440" y2="175" marker-end="none"/>
  <line x1="440" y1="175" x2="440" y2="290"/>

  <rect x="375" y="290" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="440" y="308" font-size="12">Optimize Desc.</text>

  <rect x="375" y="340" width="130" height="36" rx="4" fill="#4A90D9"/>
  <text x="440" y="358" font-size="12">Test Triggering</text>

  <line x1="440" y1="326" x2="440" y2="340"/>

  <!-- All branches converge to Done -->
  <line x1="80" y1="476" x2="80" y2="540"/>
  <line x1="220" y1="426" x2="220" y2="540"/>
  <line x1="355" y1="376" x2="355" y2="540"/>
  <line x1="440" y1="376" x2="440" y2="540"/>

  <!-- Merge lines -->
  <line x1="80" y1="540" x2="260" y2="560" marker-end="none" stroke="#333" stroke-width="1"/>
  <line x1="220" y1="540" x2="260" y2="560" marker-end="none" stroke="#333" stroke-width="1"/>
  <line x1="355" y1="540" x2="260" y2="560" marker-end="none" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="540" x2="260" y2="560" marker-end="none" stroke="#333" stroke-width="1"/>

  <!-- Done -->
  <rect x="170" y="560" width="180" height="40" rx="20" fill="#5CB85C"/>
  <text x="260" y="580">Done</text>
</svg>
