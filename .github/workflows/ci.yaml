name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit==4.2.0
      - name: Run all linters
        run: make lint

  plugin-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest and layout
        run: |
          set -euo pipefail
          shopt -s nullglob

          fail() { echo "PLUGIN STRUCTURE ERROR: $*" >&2; exit 1; }

          # plugin.json
          test -f .claude-plugin/plugin.json || fail ".claude-plugin/plugin.json is missing"
          jq empty .claude-plugin/plugin.json || fail ".claude-plugin/plugin.json is not valid JSON"
          name=$(jq -r '.name // empty' .claude-plugin/plugin.json)
          version=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          [ -n "$name" ] || fail ".claude-plugin/plugin.json is missing required field: name"
          [ -n "$version" ] || fail ".claude-plugin/plugin.json is missing required field: version"

          # marketplace.json
          test -f .claude-plugin/marketplace.json || fail ".claude-plugin/marketplace.json is missing"
          jq empty .claude-plugin/marketplace.json || fail ".claude-plugin/marketplace.json is not valid JSON"
          mp_name=$(jq -r '.name // empty' .claude-plugin/marketplace.json)
          mp_owner=$(jq -r '.owner.name // empty' .claude-plugin/marketplace.json)
          mp_plugins_len=$(jq '.plugins | length' .claude-plugin/marketplace.json)
          [ -n "$mp_name" ] || fail ".claude-plugin/marketplace.json is missing required field: name"
          [ -n "$mp_owner" ] || fail ".claude-plugin/marketplace.json is missing required field: owner.name"
          [ "$mp_plugins_len" -gt 0 ] || fail ".claude-plugin/marketplace.json has empty plugins array"
          # Every plugin entry must have a non-empty name and a non-null source
          jq -e '.plugins | all(.name and .source)' .claude-plugin/marketplace.json > /dev/null \
            || fail ".claude-plugin/marketplace.json has plugin entry missing required field: name or source"

          # hooks/hooks.json
          test -f hooks/hooks.json || fail "hooks/hooks.json is missing"
          jq empty hooks/hooks.json || fail "hooks/hooks.json is not valid JSON"
          jq -e '.hooks' hooks/hooks.json > /dev/null || fail "hooks/hooks.json missing top-level 'hooks' key"

          # Every plugin-exported skill dir must have a SKILL.md (exclude shared/)
          skill_count=0
          for d in skills/*/; do
            base=$(basename "$d")
            if [ "$base" = "shared" ]; then
              continue
            fi
            test -f "${d}SKILL.md" || fail "skills/${base}/ missing SKILL.md"
            skill_count=$((skill_count+1))
          done
          [ "$skill_count" -gt 0 ] || fail "no plugin-exported skills found under skills/"

          # Agents
          test -d agents || fail "agents/ directory is missing"
          agents=(agents/*.md)
          [ ${#agents[@]} -gt 0 ] || fail "agents/ directory has no .md files"

          # block-submodule-edit.sh must exist and be executable
          test -x scripts/block-submodule-edit.sh || fail "scripts/block-submodule-edit.sh missing or not executable"

          # Compatibility shims that preserve in-flight path resolution (to be removed in a follow-up PR)
          # scripts/larch is a real directory of per-file symlinks pointing into ../scripts/
          test -d scripts/larch || fail "scripts/larch compatibility directory is missing"
          test -L scripts/larch/session-setup.sh || fail "scripts/larch/ per-file symlinks are missing or not installed"
          test -e scripts/larch/session-setup.sh || fail "scripts/larch/session-setup.sh symlink is broken"
          # .claude/scripts/generic/larch is a single symlink pointing at ../../../scripts
          test -L .claude/scripts/generic/larch || fail ".claude/scripts/generic/larch compatibility symlink is missing"
          test -e .claude/scripts/generic/larch || fail ".claude/scripts/generic/larch compatibility symlink is broken"

          echo "Plugin structure OK: $name v$version (${#agents[@]} agents, $skill_count skills)"
