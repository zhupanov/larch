name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck all .sh files
        run: find . -name '*.sh' | grep -v '.git' | grep -v '.venv' | xargs -n1 -t shellcheck
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint all .md files
        run: find . -name '*.md' | grep -v '.git' | grep -v node_modules | xargs markdownlint --config .markdownlint.json
      - name: Validate all .json files
        run: find . -name '*.json' | grep -v '.git' | grep -v node_modules | while read -r f; do echo "  $f"; jq . "$f" > /dev/null; done
      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) && sudo mv actionlint /usr/local/bin/
      - name: actionlint
        run: find .github/workflows -maxdepth 1 \( -name '*.yml' -o -name '*.yaml' \) -print0 | xargs -0 -r actionlint
      - name: Install ruff
        run: pip install ruff
      - name: ruff check all .py files
        run: ruff check .
