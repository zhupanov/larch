# Larch pre-commit configuration
# Single source of truth for linter definitions.
# CI uses: make lint (repo-wide via pre-commit run --all-files)
# /relevant-checks uses: pre-commit run --files <changed-files> (scoped)
# Developers use: pre-commit install (opt-in git hook)

exclude: ^(\.venv/|node_modules/)

repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.json]

  - repo: local
    hooks:
      - id: jsonlint
        name: Validate JSON files
        entry: bash -c 'for f; do jq . "$f" > /dev/null || exit 1; done' --
        language: system
        types: [json]

  - repo: https://github.com/zhupanov/agent-lint
    rev: v2.3.2
    hooks:
      - id: agent-lint
        args: [--pedantic]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
